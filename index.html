<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 地球脉动 — 探索世界各地的奇观与生灵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:#060d16;color:#fff;overflow:hidden;height:100vh}

/* ===== App Layout ===== */
.app{display:flex;width:100%;height:100vh}
.globe-area{flex:1;position:relative;cursor:grab}
.globe-area:active{cursor:grabbing}
.globe-area canvas{display:block}
.globe-label{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.3);pointer-events:none;letter-spacing:2px;transition:opacity .4s}

/* ===== Region Detail Panel ===== */
.detail-panel{position:fixed;right:0;top:0;width:420px;max-width:92vw;height:100vh;background:rgba(10,16,28,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-left:1px solid rgba(255,255,255,.08);z-index:100;transform:translateX(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden}
.detail-panel.open{transform:translateX(0)}
.panel-header{padding:28px 28px 20px;position:relative}
.panel-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.panel-close:hover{background:rgba(255,255,255,.14);color:#fff}
.panel-hero{font-size:64px;line-height:1;margin-bottom:8px}
.panel-name{font-size:28px;font-weight:900;letter-spacing:1px;margin-bottom:4px}
.panel-sub{font-size:13px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px}
.panel-body{flex:1;overflow-y:auto;padding:0 28px 28px}
.panel-desc{font-size:15px;line-height:1.9;color:rgba(255,255,255,.7);margin-bottom:24px}
.panel-section-title{font-size:13px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:3px;margin-bottom:14px}
.panel-animals{display:flex;flex-wrap:wrap;gap:8px}
.panel-animal{display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;font-size:14px;cursor:pointer;transition:all .2s}
.panel-animal:hover{background:rgba(255,255,255,.14);transform:translateY(-2px)}
.panel-animal .pa-icon{font-size:24px}
.panel-animal .pa-arrow{font-size:10px;opacity:.4;margin-left:2px}

/* ===== Animal Detail Modal ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fo .2s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(145deg,#101a2a,#162032);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:36px 32px;max-width:460px;width:92%;max-height:82vh;overflow-y:auto;animation:mi .35s cubic-bezier(.16,1,.3,1)}
@keyframes mi{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{position:absolute;top:14px;right:18px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.16)}
.modal-icon{font-size:60px;text-align:center;display:block;margin-bottom:8px}
.modal h3{font-size:26px;font-weight:900;text-align:center;margin-bottom:2px}
.modal .latin{text-align:center;font-size:13px;color:rgba(255,255,255,.4);font-style:italic;margin-bottom:16px}
.modal .tags{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.modal .tag{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500}
.tag-habitat{background:rgba(46,204,113,.12);color:#6dd4a0}
.tag-status{background:rgba(240,160,75,.12);color:#f0a04b}
.modal .detail{font-size:14px;line-height:1.9;color:rgba(255,255,255,.7);margin-bottom:14px}
.modal .funfact{background:rgba(255,255,255,.04);border-left:3px solid #fc3;padding:12px 16px;border-radius:0 10px 10px 0;font-size:13px;line-height:1.8;color:rgba(255,255,255,.6)}

@media(max-width:768px){
  .detail-panel{width:100%;max-width:100%}
  .modal{padding:24px 20px}
}
</style>
</head>
<body>

<div class="app">
  <div class="globe-area" id="globeArea">
    <canvas id="globe"></canvas>
    <div class="globe-label" id="globeLabel">🖱 拖动旋转 · 点击光点</div>
  </div>
</div>

<!-- Region Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-hero" id="panelHero"></div>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-sub" id="panelSub"></div>
  </div>
  <div class="panel-body">
    <p class="panel-desc" id="panelDesc"></p>
    <div class="panel-section-title">🦓 代表物种</div>
    <div class="panel-animals" id="panelAnimals"></div>
  </div>
</div>

<!-- Animal Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <span class="modal-icon" id="modalIcon"></span>
    <h3 id="modalName"></h3>
    <p class="latin" id="modalLatin"></p>
    <div class="tags">
      <span class="tag tag-habitat" id="modalHabitat"></span>
      <span class="tag tag-status" id="modalStatus"></span>
    </div>
    <p class="detail" id="modalDesc"></p>
    <div class="funfact" id="modalFact"></div>
  </div>
</div>

  savanna:{name:'非洲稀树草原',sub:'AFRICAN SAVANNA · 坦桑尼亚 / 肯尼亚',hero:'🦁🐘🦒',desc:'广袤无垠的金色草原，地球上最壮观的野生动物王国。每年超过两百万只角马横渡马拉河，狮群在落日余晖下巡视领地，长颈鹿在合欢树间优雅踱步。这里是生命最原始的律动之地。',coords:[1,34],animals:['非洲狮','非洲象','马赛长颈鹿','斑马','猎豹','黑犀牛']},
  amazon:{name:'亚马逊雨林',sub:'AMAZON RAINFOREST · 巴西 / 秘鲁 / 哥伦比亚',hero:'🦜🐆🌿',desc:'地球之肺，覆盖南美 550 万平方公里的绿色海洋。这里孕育了全球十分之一的物种——金刚鹦鹉在树冠掠过绯红身影，美洲豹在藤蔓间无声潜行。',coords:[-4,-62],animals:['金刚鹦鹉','美洲豹','蜘蛛猴','树懒','箭毒蛙','蓝闪蝶']},

const ANIMALS = {

// ===== GLOBE RENDERING =====
const canvas = document.getElementById('globe');
const ctx = canvas.getContext('2d');
let W,H,cx,cy,R,rotY=0.4,rotX=0.12,autoRot=0.002,dragging=false,lastX=0,lastY=0;
const markers=[],landPaths=[];

function resize(){
  W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;
  cx=W/2;cy=H/2;R=Math.min(W,H)*0.42;
}
resize();window.addEventListener('resize',resize);

// Climate zone color for a given latitude
function climateColor(lat){
  const al=Math.abs(lat);
  if(al>70)return 'rgba(220,230,240,0.35)'; // polar
  if(al>55)return 'rgba(140,180,160,0.28)'; // boreal
  if(al>35)return 'rgba(100,160,100,0.30)'; // temperate
  if(al>20)return 'rgba(180,160,80,0.22)';  // subtropical arid
  if(al>10)return 'rgba(80,150,60,0.32)';   // tropical
  return 'rgba(60,140,50,0.35)';              // equatorial
}

// 3D projection
function project(lat,lon){
  const phi=lat*Math.PI/180,theta=lon*Math.PI/180;
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  const x1=Math.cos(phi)*Math.cos(theta);
  const y1=Math.sin(phi);
  const z1=Math.cos(phi)*Math.sin(theta);
  const x2=x1*cosY+z1*sinY;
  const z2a=-x1*sinY+z1*cosY;
  const y3=y1*cosX-z2a*sinX;
  const z3=y1*sinX+z2a*cosX;
  return{x:cx+x2*R,y:cy-y3*R,z:z3,vis:z3>0};
}

function drawGlobe(){
  ctx.clearRect(0,0,W,H);

  // Atmosphere
  const glow=ctx.createRadialGradient(cx,cy,R*0.9,cx,cy,R*1.1);
  glow.addColorStop(0,'rgba(64,160,255,0)');glow.addColorStop(0.5,'rgba(64,160,255,0.06)');glow.addColorStop(1,'rgba(64,160,255,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,R*1.1,0,Math.PI*2);ctx.fill();

  // Ocean
  const ocean=ctx.createRadialGradient(cx-R*.2,cy-R*.25,R*.05,cx,cy,R);
  ocean.addColorStop(0,'#3080c0');ocean.addColorStop(0.5,'#184878');ocean.addColorStop(1,'#0a1e38');
  ctx.fillStyle=ocean;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  // Climate bands on ocean
  for(let lat=-80;lat<=80;lat+=5){
    const p1=project(lat,-180),p2=project(lat,0),p3=project(lat,180);
    if(p1.vis||p2.vis||p3.vis){
      const alpha=0.03+Math.abs(lat)/90*0.04;
      if(Math.abs(lat)<15)ctx.fillStyle=`rgba(40,130,50,${alpha})`;
      else if(Math.abs(lat)<35)ctx.fillStyle=`rgba(160,140,60,${alpha})`;
      else if(Math.abs(lat)<55)ctx.fillStyle=`rgba(80,140,100,${alpha})`;
      else ctx.fillStyle=`rgba(200,220,240,${alpha})`;
      ctx.beginPath();
      for(let lon=-180;lon<=180;lon+=2){
        const p=project(lat,lon);if(p.vis)lon===-180?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
      }
      ctx.fill();
    }
  }

  // Lat/lon grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let lat=-60;lat<=60;lat+=30){ctx.beginPath();for(let lon=-180;lon<=180;lon+=2){const p=project(lat,lon);if(p.vis)lon===-180?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}ctx.stroke();}
  for(let lon=-180;lon<180;lon+=30){ctx.beginPath();for(let lat=-90;lat<=90;lat+=2){const p=project(lat,lon);if(p.vis)lat===-90?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}ctx.stroke();}

  // Draw continents
  landPaths.length=0;
  Object.entries(CONTINENTS).forEach(([name,poly])=>{
    // Build projected polygon
    const projected=[];
    let minZ=Infinity;
    poly.forEach(([lon,lat])=>{
      const p=project(lat,lon);
      projected.push(p);
      if(p.z<minZ)minZ=p.z;
    });
    if(minZ<=0)return; // behind globe

    // Determine fill color based on continent and latitude
    let fillColor;
    if(name==='antarctica')fillColor='rgba(230,235,240,0.55)';
    else if(name==='africa'){
      const grad=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
      grad.addColorStop(0,'rgba(140,170,100,0.38)');
      grad.addColorStop(0.3,'rgba(180,160,80,0.34)');
      grad.addColorStop(0.6,'rgba(100,150,70,0.40)');
      grad.addColorStop(1,'rgba(140,170,100,0.38)');
      fillColor=grad;
    }else if(name==='sAmerica'){
      fillColor='rgba(80,150,60,0.38)';
    }else if(name==='nAmerica'){
      const grad=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
      grad.addColorStop(0,'rgba(120,160,110,0.36)');
      grad.addColorStop(0.5,'rgba(100,145,80,0.38)');
      grad.addColorStop(1,'rgba(130,170,120,0.36)');
      fillColor=grad;
    }else if(name==='europe'){
      fillColor='rgba(130,160,115,0.36)';
    }else if(name==='asia'){
      const grad=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
      grad.addColorStop(0,'rgba(120,155,100,0.36)');
      grad.addColorStop(0.4,'rgba(160,150,80,0.30)');
      grad.addColorStop(0.7,'rgba(100,145,75,0.38)');
      grad.addColorStop(1,'rgba(130,160,110,0.36)');
      fillColor=grad;
    }else if(name==='australia'){
      fillColor='rgba(190,150,80,0.40)';
    }else fillColor='rgba(110,150,90,0.36)';

    ctx.fillStyle=fillColor;
    ctx.beginPath();
    projected.forEach((p,i)=>{
      if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
    });
    ctx.closePath();ctx.fill();

    // Coastline
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.6;
    ctx.stroke();

    landPaths.push({poly:projected,name});
  });

  // Region markers
  markers.length=0;
  Object.entries(REGIONS).forEach(([key,region])=>{
    const [lat,lon]=region.coords;
    const p=project(lat,lon);
    if(!p.vis)return;
    markers.push({...p,key});

    const t=Date.now()/1000;
    const pulse=1+Math.sin(t*2.5+lat)*0.18;
    const r=5.5*pulse;

    // Outer glow
    const rg=ctx.createRadialGradient(p.x,p.y,r*.4,p.x,p.y,r*2.8);
    rg.addColorStop(0,'rgba(255,210,60,0.65)');rg.addColorStop(0.5,'rgba(255,140,30,0.25)');rg.addColorStop(1,'rgba(255,100,20,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(p.x,p.y,r*2.8,0,Math.PI*2);ctx.fill();

    // Core
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,220,100,0.7)';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });

  // Sphere shading
  const es=ctx.createRadialGradient(cx,cy,R*.88,cx,cy,R);
  es.addColorStop(0,'rgba(0,0,0,0)');es.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=es;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  const hl=ctx.createRadialGradient(cx-R*.28,cy-R*.32,R*.04,cx,cy,R);
  hl.addColorStop(0,'rgba(255,255,255,.1)');hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
}

function animate(){
  if(!dragging)rotY+=autoRot;
  drawGlobe();
  requestAnimationFrame(animate);
}

// ===== MOUSE/TOUCH =====
const globeArea=document.getElementById('globeArea');
canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY});
canvas.addEventListener('mousemove',e=>{if(!dragging)return;rotY+=(e.clientX-lastX)*.005;rotX+=(e.clientY-lastY)*.005;rotX=Math.max(-.8,Math.min(.8,rotX));lastX=e.clientX;lastY=e.clientY});
canvas.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('mouseleave',()=>dragging=false);
canvas.addEventListener('touchstart',e=>{dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!dragging)return;rotY+=(e.touches[0].clientX-lastX)*.005;rotX+=(e.touches[0].clientY-lastY)*.005;rotX=Math.max(-.8,Math.min(.8,rotX));lastX=e.touches[0].clientX;lastY=e.touches[0].clientY});
canvas.addEventListener('touchend',()=>dragging=false);

// Click markers → open panel
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  for(const m of markers){
    if(Math.hypot(mx-m.x,my-m.y)<28){openPanel(m.key);return;}
  }
});

// ===== PANEL =====
const panel=document.getElementById('detailPanel');
const globeLabel=document.getElementById('globeLabel');
let currentRegion=null;

function openPanel(key){
  currentRegion=key;
  const r=REGIONS[key];
  document.getElementById('panelHero').textContent=r.hero;
  document.getElementById('panelName').textContent=r.name;
  document.getElementById('panelSub').textContent=r.sub;
  document.getElementById('panelDesc').textContent=r.desc;
  const ac=document.getElementById('panelAnimals');
  ac.innerHTML='';
  r.animals.forEach(name=>{
    const chip=document.createElement('span');
    chip.className='panel-animal';
    chip.innerHTML=`<span class="pa-icon">${ANIMALS[name].icon}</span>${name}<span class="pa-arrow">▸</span>`;
    chip.onclick=e=>{e.stopPropagation();openModal(name);};
    ac.appendChild(chip);
  });
  panel.classList.add('open');
  globeLabel.style.opacity='0';
}

function closePanel(){
  panel.classList.remove('open');
  currentRegion=null;
  globeLabel.style.opacity='1';
}

// ===== ANIMAL MODAL =====
function openModal(name){
  const a=ANIMALS[name];if(!a)return;
  document.getElementById('modalIcon').textContent=a.icon;
  document.getElementById('modalName').textContent=name;
  document.getElementById('modalLatin').textContent=a.latin;
  document.getElementById('modalHabitat').textContent='🌍 '+a.habitat;
  document.getElementById('modalStatus').textContent=a.status;
  document.getElementById('modalDesc').textContent=a.desc;
  document.getElementById('modalFact').textContent='💡 '+a.fact;
  document.getElementById('modalOverlay').style.display='flex';document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').style.display='none';document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeModal();}});

// ===== INIT =====
resize();animate();
</script>
